{{- range $component, $port := dict "server" 3000 "broker" 3001 "web" 8080 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ $component }}
  labels:
    {{- include "effect-agent.labels" $ | nindent 4 }}
spec:
  selector: { app.kubernetes.io/instance: {{ $.Release.Name }}, app.kubernetes.io/component: {{ $component }} }
  ports: [{ name: http, port: 80, targetPort: {{ $port }} }]
{{- end }}
