{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.webHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: {{ .Release.Name }}-web, port: { number: 80 } } }
          - path: /api
            pathType: Prefix
            backend: { service: { name: {{ .Release.Name }}-server, port: { number: 80 } } }
    - host: {{ .Values.ingress.brokerHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: {{ .Release.Name }}-broker, port: { number: 80 } } }
{{- end }}
