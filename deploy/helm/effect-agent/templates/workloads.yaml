{{- range $component := list "server" "worker" "broker" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $component }}
  labels:
    {{- include "effect-agent.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ index $.Values.replicaCount $component }}
  selector: { matchLabels: { app.kubernetes.io/instance: {{ $.Release.Name }}, app.kubernetes.io/component: {{ $component }} } }
  template:
    metadata: { labels: { app.kubernetes.io/instance: {{ $.Release.Name }}, app.kubernetes.io/component: {{ $component }} } }
    spec:
      serviceAccountName: {{ $.Release.Name }}-{{ $component }}
      securityContext: { seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: {{ $component }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["pnpm", "--filter", {{ if eq $component "server" }}"@repo/server"{{ else if eq $component "worker" }}"@repo/worker-app"{{ else }}"@repo/credential-broker"{{ end }}, "start"]
          env:
            {{- if eq $component "server" }}
            {{- include "effect-agent.serverEnv" $ | nindent 12 }}
            {{- else if eq $component "broker" }}
            {{- include "effect-agent.brokerEnv" $ | nindent 12 }}
            {{- else }}
            {{- include "effect-agent.workerEnv" $ | nindent 12 }}
            {{- end }}
          {{- if eq $component "server" }}
          ports: [{ name: http, containerPort: 3000 }]
          readinessProbe: { httpGet: { path: /readyz, port: http }, initialDelaySeconds: 3 }
          livenessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 10 }
          {{- else if eq $component "broker" }}
          ports: [{ name: http, containerPort: 3001 }]
          readinessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 3 }
          livenessProbe: { httpGet: { path: /healthz, port: http }, initialDelaySeconds: 10 }
          {{- end }}
          resources:
            {{- toYaml (index $.Values.resources $component) | nindent 12 }}
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, runAsNonRoot: true, capabilities: { drop: ["ALL"] } }
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "effect-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount.web }}
  selector: { matchLabels: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: web } }
  template:
    metadata: { labels: { app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: web } }
    spec:
      automountServiceAccountToken: false
      containers:
        - name: web
          image: "{{ .Values.webImage.repository }}:{{ .Values.webImage.tag }}"
          ports: [{ name: http, containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /healthz, port: http } }
          resources:
            {{- toYaml .Values.resources.web | nindent 12 }}
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, runAsNonRoot: true, capabilities: { drop: ["ALL"] } }
